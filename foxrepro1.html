<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor IbraFut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #020617; overflow: hidden; }
        .loader-spin {
            border-bottom: 2px solid #22c55e;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020617;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        iframe {
            display: none;
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-spin mb-4"></div>
        <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-slate-400">
            Optimizando <span class="text-green-500">Señal</span>
        </p>
    </div>

    <div id="player-container"></div>

    <script type="text/javascript">
        function getParameterByName(name) {
            name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
            var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
                results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
        }

        var embed = getParameterByName("embed") || getParameterByName("r");

        if (embed) {
            try {
                var decodedUrl = atob(embed);
                var container = document.getElementById('player-container');
                
                var iframe = document.createElement('iframe');
                iframe.src = decodedUrl;
                iframe.id = "reproductor";
                iframe.allow = "encrypted-media; autoplay";
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('scrolling', 'no');

                /* ATENCIÓN: ATRIBUTO SANDBOX
                   - allow-scripts: permite que el video cargue.
                   - allow-same-origin: permite la conexión.
                   - allow-forms: permite interactuar.
                   - SIN 'allow-popups': ESTO BLOQUEA LAS VENTANAS EMERGENTES.
                */
                iframe.setAttribute('sandbox', 'allow-forms allow-scripts allow-same-origin allow-presentation');
                
                container.appendChild(iframe);

                setTimeout(function() {
                    var loader = document.getElementById('loading-screen');
                    loader.style.opacity = '0';
                    setTimeout(function() {
                        loader.style.display = 'none';
                        iframe.style.display = 'block';
                    }, 400);
                }, 2500);

            } catch (e) {
                document.getElementById('loading-screen').innerHTML = '<p class="text-red-500 text-[10px]">Error de decodificación</p>';
            }
        } else {
            document.getElementById('loading-screen').innerHTML = '<p class="text-slate-500 text-[10px]">Sin señal</p>';
        }
    </script>
</body>
</html>
