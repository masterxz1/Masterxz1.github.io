<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor IbraFut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fondo negro para el cine */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        
        .loader-spin {
            border-bottom: 2px solid #22c55e;
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; /* Tu azul oscuro característico */
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #player-container, iframe {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-spin mb-4"></div>
        <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-slate-400">
            Sincronizando <span class="text-green-500">Señal HD</span>
        </p>
    </div>

    <div id="player-container"></div>

    <script type="text/javascript">
        function getParameterByName(name) {
            name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
            var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
                results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
        }

        // Capturamos el hash Base64
        var embed = getParameterByName("embed") || getParameterByName("r");

        if (embed) {
            try {
                var decodedUrl = atob(embed);
                var container = document.getElementById('player-container');
                
                var iframe = document.createElement('iframe');
                iframe.src = decodedUrl;
                iframe.id = "reproductor";
                iframe.allow = "autoplay; fullscreen; encrypted-media";
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('scrolling', 'no');
                
                // Sin sandbox para máxima compatibilidad
                container.appendChild(iframe);

                // Quitamos el loader después de un tiempo prudente
                setTimeout(function() {
                    var loader = document.getElementById('loading-screen');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(function() { loader.remove(); }, 500);
                    }
                }, 3000); // 3 segundos de espera para que cargue la fuente

            } catch (e) {
                document.getElementById('loading-screen').innerHTML = '<p class="text-red-500 text-[10px] font-bold">ERROR DE SEÑAL</p>';
            }
        } else {
            document.getElementById('loading-screen').innerHTML = '<p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Esperando canal...</p>';
        }
    </script>
</body>
</html>
