    <style>
        :root { --primary: #bedb1e; --bg-dark: #020617; --bg-card: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #f8fafc; margin: 0; overflow-x: hidden; }
        
        /* NAVBAR */
        .navbar {
            height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(190, 219, 30, 0.2); display: flex;
            align-items: center; justify-content: space-between; padding: 0 20px;
            position: sticky; top: 0; z-index: 200;
        }
        .logo-text { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        .logo-dot { color: var(--primary); }

        .main-wrapper { display: flex; flex-direction: column; min-height: calc(100vh - 60px); }

        @media (min-width: 1024px) {
            .main-wrapper { flex-direction: row; height: calc(100vh - 60px); overflow: hidden; }
            #screen-container { flex: 1.8; height: 100% !important; border-bottom: none !important; border-right: 2px solid var(--primary); }
            .content-side { flex: 1; height: 100%; overflow-y: auto; }
        }

        #screen-container {
            width: 100%; height: 220px; background: #000; position: relative;
            border-bottom: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #welcome-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        #loader {
            display: none; width: 40px; height: 40px; border: 4px solid rgba(190, 219, 30, 0.1);
            border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; z-index: 10; position: absolute;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; z-index: 5; position: relative; background: black; }

        .tabs-nav { display: flex; justify-content: space-around; padding: 12px 0; background: #1e293b; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 50; }
        .tab-link { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; cursor: pointer; border: none; background: none; transition: all 0.2s; }
        .tab-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 4px; }
        .tab-link:active { transform: scale(0.9); opacity: 0.7; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .event-card { background: var(--bg-card); border: 1px solid #1e293b; margin: 8px 10px; border-radius: 12px; overflow: hidden; }
        .event-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 12px; transition: background 0.1s; }
        .event-header:active { background-color: rgba(190, 219, 30, 0.1); }

        .channels-list { display: none; background: #020617; padding: 12px 8px; border-top: 1px solid #1e293b; }
        
        .channel-btn { 
            display: flex; justify-content: space-between; align-items: center; width: 100%; 
            padding: 12px; margin-bottom: 6px; background: #1e293b; border-radius: 8px; 
            font-size: 12px; font-weight: bold; color: white; transition: all 0.1s;
        }
        .channel-btn:hover { background: var(--primary); color: #000; }
        .channel-btn:active { transform: scale(0.95); background-color: var(--primary) !important; color: #000 !important; }
        
        .time-box { text-align: right; min-width: 60px; flex-shrink: 0; }
        .time-value { font-size: 13px; font-weight: 900; color: var(--primary); display: block; }
        .time-tag { font-size: 8px; color: #64748b; text-transform: uppercase; display: block; margin-top: 1px; }

        .timer-box { padding: 10px; text-align: center; }
        .timer-text { font-size: 11px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .progress-bg { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 1s linear; }
        
        .rotate-icon { transition: 0.3s; width: 14px; height: 14px; color: #475569; flex-shrink: 0; }
        .open .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body>

    <div id="click-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; cursor: pointer; background: rgba(0,0,0,0);"></div>

    <div class="main-wrapper">
        <div id="screen-container">
            <div id="loader"></div>
            <img id="welcome-bg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgrOBxvOQDZn8dWKxalQ_lVXKPUHGtPr-AJKr-K-vJNZ_sl3fo_6MJ6SxtRRCk0qzL-GETrXhKIbvoUKIbg9umNc20HsV1EUykTAK0SxMsFbSnjqlrWMIvE_GFaU4AVKxOiy71ysB7uioKMwARBTNAtHVeE3VtWFgGd_crurS-XF67cvEzEftpF7c6VBR8/s1600/261%20sin%20t%C3%ADtulo_20260408122458.png">

    <script>
        (function() {
            const directLink = "https://omg10.com/4/8632131"; 
            const layer = document.getElementById('click-layer');
            const intervalInMinutes = 3;
            const storageKey = 'last_monetag_click';

            function shouldShowAd() {
                const lastClick = localStorage.getItem(storageKey);
                if (!lastClick) return true;
                const now = new Date().getTime();
                const diff = now - parseInt(lastClick);
                return (diff / (1000 * 60)) >= intervalInMinutes;
            }

            if (!shouldShowAd() && layer) layer.style.display = 'none';

            if (layer) {
                layer.addEventListener('click', function() {
                    window.open(directLink, '_blank');
                    localStorage.setItem(storageKey, new Date().getTime().toString());
                    layer.style.display = 'none';
                });
            }
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-VhCuGTc78Na6JJWtyE7XS0i588bhMeA",
            authDomain: "futbol-gratis-14878.firebaseapp.com",
            projectId: "futbol-gratis-14878",
            storageBucket: "futbol-gratis-14878.firebasestorage.app",
            messagingSenderId: "1098709098029",
            appId: "1:1098709098029:web:d8f9100fbc2eae93b6a2a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function getFechaEvento(horaPeru) {
            const [horas, minutos] = horaPeru.split(':');
            const fecha = new Date();
            return new Date(Date.UTC(fecha.getFullYear(), fecha.getMonth(), fecha.getDate(), parseInt(horas) + 5, minutos));
        }

        function actualizarTemporizadores() {
            document.querySelectorAll('.timer-container').forEach(container => {
                const horaEventoStr = container.dataset.hora;
                const fechaEvento = getFechaEvento(horaEventoStr);
                const ahora = new Date();
                const diffMs = fechaEvento - ahora;
                const barra = container.querySelector('.progress-bar');
                const texto = container.querySelector('.timer-text');

                if (diffMs > 0) {
                    const h = Math.floor(diffMs / (1000 * 60 * 60));
                    const m = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diffMs % (1000 * 60)) / 1000);
                    texto.innerText = `⏳ FALTAN ${h}H ${m}M ${s}S`;
                    let secondsRemaining = (h * 3600) + (m * 60) + s;
                    let porcentaje = Math.max(2, 100 - (secondsRemaining / 3600 * 100));
                    barra.style.width = `${porcentaje}%`;
                } else {
                    texto.innerText = `🔄 SEÑALES DISPONIBLES`;
                    barra.style.width = `100%`;
                }
            });
        }
        setInterval(actualizarTemporizadores, 1000);

        window.openTab = (evt, tabName) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        };

        window.loadStream = (url) => {
            const container = document.getElementById('screen-container');
            container.innerHTML = `<div id="loader" style="display:block"></div><iframe id="videoFrame" src="${url}" allowfullscreen scrolling="no"></iframe>`;
            const frame = document.getElementById('videoFrame');
            frame.onload = () => { document.getElementById('loader').style.display = "none"; };
            if (window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.toggleAccordion = (id) => {
            const el = document.getElementById(`channels-${id}`);
            const card = el.closest('.event-card');
            const isVisible = el.style.display === "block";
            document.querySelectorAll('.channels-list').forEach(list => list.style.display = "none");
            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('open'));
            if (!isVisible) { el.style.display = "block"; card.classList.add('open'); }
        };

        const q = query(collection(db, "agenda"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('schedule-list');
            let htmlContent = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                const horaFinal = new getFechaEvento(data.hora).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                const urls = Array.isArray(data.url) ? data.url : (data.url ? [data.url] : []);
                
                let contentInside = (urls.length > 0 && urls[0] !== "") 
                    ? urls.map((link, i) => `
                        <button class="channel-btn" onclick="loadStream('${link}')">
                            <span><span class="text-lime-400">▶</span> OPCIÓN HD ${i+1}</span>
                            <span class="text-[9px] bg-slate-800 px-2 py-1 rounded text-slate-400">SEÑAL ${i+1}</span>
                        </button>`).join('')
                    : `<div class="timer-container" data-hora="${data.hora}">
                        <div class="timer-box">
                            <div class="timer-text"></div>
                            <div class="progress-bg"><div class="progress-bar"></div></div>
                        </div>
                       </div>`;

                htmlContent += `
                    <div class="event-card">
                        <div class="event-header" onclick="toggleAccordion('${id}')">
                            <div class="flex items-center gap-3 flex-1">
                                <div class="flex-shrink-0">${data.live ? `<img src="https://i.imgur.com/FhIaVzD.gif" class="w-8">` : `🕒`}</div>
                                <div>
                                    <div class="text-[9px] font-black text-lime-400 uppercase">${data.liga || 'Internacional'}</div>
                                    <div class="text-sm font-bold leading-tight">${data.titulo}</div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="time-box">
                                    <span class="time-value">${horaFinal}</span>
                                    <span class="time-tag">Local</span>
                                </div>
                                <svg class="rotate-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round"></path></svg>
                            </div>
                        </div>
                        <div id="channels-${id}" class="channels-list">${contentInside}</div>
                    </div>`;
            });
            listElement.innerHTML = htmlContent;
            actualizarTemporizadores();
        });
    </script>
</body>
